<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111318">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/mobile/manifest.json">
  <link rel="stylesheet" href="/mobile/style.css">
  <title>DeskBuddy Mobile</title>
</head>
<body>
  <!-- Top Bar -->
  <header id="top-bar">
    <span class="brand-prefix">DESKBUDDY</span><span class="brand-suffix"> on Mobile</span>
    <span class="top-bar-spacer"></span>
    <span class="connection-dot" id="connection-dot"></span>
    <span class="connection-text" id="connection-text"></span>
  </header>

  <!-- Page: Sessions -->
  <main id="page-sessions" class="page">
    <div id="session-list"></div>
  </main>

  <!-- Page: Settings -->
  <section id="page-settings" class="page hidden">
    <div id="settings-content"></div>
  </section>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <div class="nav-tab active" data-tab="sessions">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Sessions</span>
    </div>
    <div class="nav-tab" data-tab="settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Devices</span>
    </div>
  </nav>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="/mobile/icons.js"></script>
  <script src="/mobile/app.js"></script>
</body>
</html>
