<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-groove-sway 1s ease-in-out infinite; }
      @keyframes db-groove-sway {
        0%, 100% { transform: rotate(-5deg); }
        50%      { transform: rotate(5deg); }
      }
      .note { animation: db-note-float 2s ease-in-out infinite; }
      .note2 { animation-delay: 0.7s; }
      @keyframes db-note-float {
        0%   { opacity: 0; transform: translate(0,4px); }
        30%  { opacity: 1; transform: translate(0,0); }
        100% { opacity: 0; transform: translate(2px,-8px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round">
      <path d="M6.5 13 Q9 11 11.5 13"/>
      <path d="M14.5 13 Q17 11 19.5 13"/>
    </g>
    <path d="M9 19.5 Q13 22 17 19.5" stroke="#1a1025" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <text class="note" x="25" y="6" font-size="6" fill="#ffffff">&#9834;</text>
  <text class="note note2" x="30" y="12" font-size="5" fill="#ffffff">&#9834;</text>
</svg>