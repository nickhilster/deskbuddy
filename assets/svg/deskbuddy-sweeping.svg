<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-sweep-lean 1.8s ease-in-out infinite; }
      @keyframes db-sweep-lean {
        0%, 100% { transform: rotate(-4deg); }
        50%      { transform: rotate(4deg); }
      }
      .broom { transform-box: fill-box; transform-origin: 50% 100%; animation: db-broom-swing 1.8s ease-in-out infinite; }
      @keyframes db-broom-swing {
        0%, 100% { transform: translateX(-2px) rotate(-10deg); }
        50%      { transform: translateX(2px) rotate(10deg); }
      }
      .dust { animation: db-dust 1.8s ease-out infinite; }
      .dust2 { animation-delay: 0.5s; }
      @keyframes db-dust {
        0%   { opacity: 0.8; transform: translate(0,0) scale(0.6); }
        100% { opacity: 0; transform: translate(2px,-2px) scale(1.1); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <ellipse cx="9" cy="14" rx="1.7" ry="1.4"/>
      <ellipse cx="17" cy="14" rx="1.7" ry="1.4"/>
    </g>
    <path d="M10 20 Q13 21.2 16 20" stroke="#1a1025" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <g class="broom" stroke="#a8734a" stroke-width="1" stroke-linecap="round">
    <line x1="25" y1="24" x2="30" y2="4"/>
  </g>
  <g class="broom" fill="#e0b95c">
    <path d="M28 2 L34 2 L32 8 L30 8 Z"/>
  </g>
  <circle class="dust" cx="34" cy="10" r="0.9" fill="#cbd5e1"/>
  <circle class="dust dust2" cx="37" cy="14" r="0.7" fill="#cbd5e1"/>
</svg>
