<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 50%; animation: db-dizzy-wobble 1.1s ease-in-out infinite; }
      @keyframes db-dizzy-wobble {
        0%, 100% { transform: rotate(-6deg); }
        50%      { transform: rotate(6deg); }
      }
      .spiral { transform-box: fill-box; transform-origin: 50% 50%; animation: db-spin 2s linear infinite; }
      @keyframes db-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .orbit { animation: db-orbit 2.4s linear infinite; }
      @keyframes db-orbit {
        0%   { transform: translate(0,0); opacity: 0.6; }
        50%  { transform: translate(2px,-3px); opacity: 1; }
        100% { transform: translate(0,0); opacity: 0.6; }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g class="spiral" stroke="#1a1025" stroke-width="0.8" fill="none">
      <path d="M9 13 m-1.6,0 a1.6,1.6 0 1,0 3.2,0 a0.9,0.9 0 1,1 -1.8,0"/>
      <path d="M17 13 m-1.6,0 a1.6,1.6 0 1,0 3.2,0 a0.9,0.9 0 1,1 -1.8,0"/>
    </g>
    <path d="M10 19.5 Q11.5 18.3 13 19.5 Q14.5 20.7 16 19.5" stroke="#1a1025" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  </g>
  <g fill="#ffd166">
    <circle class="orbit" cx="1" cy="6" r="0.9"/>
    <circle class="orbit" cx="27" cy="4" r="0.8"/>
    <circle class="orbit" cx="28" cy="18" r="0.9"/>
  </g>
</svg>