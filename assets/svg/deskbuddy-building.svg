<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 -15 52 52" width="400" height="400">
  <defs>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      #body-js { transform-box: fill-box; transform-origin: 50% 100%; animation: db-build-bounce 0.6s ease-in-out infinite; }
      @keyframes db-build-bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-0.8px); }
      }
      .block { animation: db-block-stack 2s ease-in-out infinite; }
      .block2 { animation-delay: 0.5s; }
      .block3 { animation-delay: 1s; }
      @keyframes db-block-stack {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-1.5px); }
      }
    </style>
  </defs>
  <ellipse cx="13" cy="27" rx="9" ry="1.5" fill="#000000" opacity="0.35"/>
  <g id="body-js">
    <circle cx="13" cy="15" r="11" fill="url(#db-gradient)"/>
    <g fill="#1a1025">
      <circle cx="9" cy="13" r="2"/>
      <circle cx="17" cy="13" r="2"/>
    </g>
    <circle cx="13" cy="20" r="1.1" fill="#1a1025"/>
  </g>
  <rect class="block" x="24" y="14" width="5" height="5" fill="#2dd4bf"/>
  <rect class="block block2" x="30" y="9" width="5" height="5" fill="#a78bfa"/>
  <rect class="block block3" x="24" y="4" width="5" height="5" fill="#ec4899"/>
</svg>