<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Spark: Tired/Bored State -->

  <ellipse cx="7.5" cy="15" rx="6" ry="2" fill="rgba(0,0,0,0.15)"/>

  <!-- Body (slouched down) -->
  <g transform="translate(0, 1.5)">
    <rect x="2" y="-2" width="11" height="11" rx="2" fill="#4A90E2" opacity="0.85"/>
    <circle cx="4" cy="-3" r="1.2" fill="#4A90E2"/>
    <circle cx="10" cy="-3" r="1.2" fill="#4A90E2"/>
    <rect x="3.5" y="1" width="8" height="5" rx="1.5" fill="#6BA3F5" opacity="0.5"/>

    <!-- Tired Eyes (half-closed with eyelids) -->
    <g>
      <!-- Left eye -->
      <circle cx="5" cy="3.5" r="1.8" fill="white" opacity="0.8"/>
      <path d="M 3.2 3.5 Q 5 4.5 6.8 3.5" stroke="#000000" stroke-width="1.2" fill="#4A90E2"/>
      <circle cx="5" cy="3.2" r="0.8" fill="#000000"/>

      <!-- Right eye -->
      <circle cx="10" cy="3.5" r="1.8" fill="white" opacity="0.8"/>
      <path d="M 8.2 3.5 Q 10 4.5 11.8 3.5" stroke="#000000" stroke-width="1.2" fill="#4A90E2"/>
      <circle cx="10" cy="3.2" r="0.8" fill="#000000"/>
    </g>

    <!-- Yawning mouth -->
    <ellipse cx="7.5" cy="6" rx="0.7" ry="1.1" fill="#000000"/>

    <!-- Tired expression (droopy eyebrows) -->
    <path d="M 4 1.8 Q 5 1.8 6 2.2" stroke="#2E5C8A" stroke-width="0.3" stroke-linecap="round"/>
    <path d="M 10 1.8 Q 9 1.8 8 2.2" stroke="#2E5C8A" stroke-width="0.3" stroke-linecap="round"/>

    <!-- ZZZ particles floating -->
    <text x="10" y="-5" font-size="1.5" fill="#4A90E2" opacity="0.6">Z</text>
  </g>

  <!-- Arms drooping -->
  <g>
    <line x1="3" y1="4" x2="1" y2="6.5" stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="0.8" cy="6.8" r="0.6" fill="#6BA3F5"/>

    <line x1="12" y1="4" x2="14" y2="6.5" stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="14.2" cy="6.8" r="0.6" fill="#6BA3F5"/>
  </g>
</svg>