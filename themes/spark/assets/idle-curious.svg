<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Spark: Idle/Curious State with Eye Tracking -->

  <!-- Shadow (trackable) -->
  <ellipse id="shadow-js" cx="7.5" cy="15" rx="6" ry="2" fill="rgba(0,0,0,0.15)"/>

  <!-- Body Group (trackable for subtle rotation) -->
  <g id="body-js">
    <!-- Main body: rounded square -->
    <rect x="2" y="-2" width="11" height="11" rx="2" fill="#4A90E2" opacity="0.9"/>

    <!-- Ears/antennae -->
    <circle cx="4" cy="-3" r="1.2" fill="#4A90E2"/>
    <circle cx="10" cy="-3" r="1.2" fill="#4A90E2"/>

    <!-- Belly accent -->
    <rect x="3.5" y="1" width="8" height="5" rx="1.5" fill="#6BA3F5" opacity="0.6"/>

    <!-- Eyes Group (trackable for following) -->
    <g id="eyes-js">
      <!-- Left eye -->
      <circle cx="5" cy="3" r="1.8" fill="white"/>
      <circle cx="5" cy="3" r="1.2" fill="#000000"/>
      <circle cx="5.3" cy="2.7" r="0.5" fill="white" opacity="0.8"/>

      <!-- Right eye -->
      <circle cx="10" cy="3" r="1.8" fill="white"/>
      <circle cx="10" cy="3" r="1.2" fill="#000000"/>
      <circle cx="10.3" cy="2.7" r="0.5" fill="white" opacity="0.8"/>
    </g>

    <!-- Mouth: playful smile -->
    <path d="M 6 5.5 Q 7.5 6.2 9 5.5" stroke="#000000" stroke-width="0.3" fill="none" stroke-linecap="round"/>

    <!-- Playful eyebrows (curious tilt) -->
    <path d="M 4 1.5 Q 5 1 6 1.2" stroke="#2E5C8A" stroke-width="0.3" fill="none" stroke-linecap="round"/>
    <path d="M 9 1.2 Q 10 1 11 1.5" stroke="#2E5C8A" stroke-width="0.3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Arms (show playful stance) -->
  <g>
    <!-- Left arm -->
    <line x1="2.5" y1="4" x2="0.5" y2="5" stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="0.3" cy="5.2" r="0.6" fill="#6BA3F5"/>

    <!-- Right arm -->
    <line x1="12.5" y1="4" x2="14.5" y2="5" stroke="#4A90E2" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="14.7" cy="5.2" r="0.6" fill="#6BA3F5"/>
  </g>
</svg>