<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Spark: Thinking/Confused State -->

  <ellipse cx="7.5" cy="15" rx="6" ry="2" fill="rgba(0,0,0,0.15)"/>

  <!-- Body (tilted head) -->
  <g transform="rotate(-15 7.5 4)">
    <rect x="2" y="-2" width="11" height="11" rx="2" fill="#4A90E2" opacity="0.9"/>
    <circle cx="4" cy="-3" r="1.2" fill="#4A90E2"/>
    <circle cx="10" cy="-3" r="1.2" fill="#4A90E2"/>
    <rect x="3.5" y="1" width="8" height="5" rx="1.5" fill="#6BA3F5" opacity="0.6"/>

    <!-- Confused Eyes -->
    <g>
      <circle cx="5" cy="3" r="1.8" fill="white"/>
      <circle cx="5" cy="3.2" r="1.2" fill="#4A90E2"/>
      <circle cx="5.2" cy="2.8" r="0.5" fill="white" opacity="0.7"/>

      <circle cx="10" cy="3" r="1.8" fill="white"/>
      <circle cx="10" cy="3.2" r="1.2" fill="#4A90E2"/>
      <circle cx="10.2" cy="2.8" r="0.5" fill="white" opacity="0.7"/>
    </g>

    <!-- Questioning mouth (o shape) -->
    <circle cx="7.5" cy="5.8" r="0.6" fill="#000000"/>

    <!-- Confused/concerned eyebrows -->
    <path d="M 4 1.5 L 5.5 0.8" stroke="#2E5C8A" stroke-width="0.3" stroke-linecap="round"/>
    <path d="M 10 1.5 L 8.5 0.8" stroke="#2E5C8A" stroke-width="0.3" stroke-linecap="round"/>

    <!-- Hand scratching head -->
    <line x1="1.5" y1="1" x2="-0.5" y2="-0.5" stroke="#6BA3F5" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="-1" cy="-1" r="0.6" fill="#6BA3F5"/>
  </g>

  <!-- Question mark symbol floating above -->
  <text x="11.5" y="-8" font-size="3" font-weight="bold" fill="#FF9933">?</text>
</svg>