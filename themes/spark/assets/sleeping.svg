<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Spark: Sleeping State (Peaceful) -->

  <!-- Sleeping shadow (flattened) -->
  <ellipse cx="7.5" cy="15.5" rx="6.5" ry="1.8" fill="rgba(0,0,0,0.1)"/>

  <!-- Body (curled up peacefully) -->
  <g transform="translate(0, 2)">
    <rect x="2" y="-2" width="11" height="11" rx="2" fill="#4A90E2" opacity="0.88"/>
    <circle cx="4" cy="-3" r="1.2" fill="#4A90E2"/>
    <circle cx="10" cy="-3" r="1.2" fill="#4A90E2"/>
    <rect x="3.5" y="1" width="8" height="5" rx="1.5" fill="#6BA3F5" opacity="0.55"/>

    <!-- Sleeping Eyes (peaceful closed curves) -->
    <g>
      <!-- Left eye peaceful -->
      <path d="M 3.8 2.8 Q 5 3.5 6.2 2.8" stroke="#000000" stroke-width="0.8" fill="#4A90E2"/>
      <!-- Eyelashes -->
      <line x1="4" y1="2.8" x2="3.9" y2="2.2" stroke="#2E5C8A" stroke-width="0.2"/>
      <line x1="5" y1="3.6" x2="5" y2="4.1" stroke="#2E5C8A" stroke-width="0.2"/>
      <line x1="6" y1="2.8" x2="6.1" y2="2.2" stroke="#2E5C8A" stroke-width="0.2"/>

      <!-- Right eye peaceful -->
      <path d="M 8.8 2.8 Q 10 3.5 11.2 2.8" stroke="#000000" stroke-width="0.8" fill="#4A90E2"/>
      <!-- Eyelashes -->
      <line x1="9" y1="2.8" x2="8.9" y2="2.2" stroke="#2E5C8A" stroke-width="0.2"/>
      <line x1="10" y1="3.6" x2="10" y2="4.1" stroke="#2E5C8A" stroke-width="0.2"/>
      <line x1="11" y1="2.8" x2="11.1" y2="2.2" stroke="#2E5C8A" stroke-width="0.2"/>
    </g>

    <!-- Peaceful smile -->
    <path d="M 6 5.5 Q 7.5 6 9 5.5" stroke="#000000" stroke-width="0.3" fill="none" stroke-linecap="round"/>

    <!-- Calm eyebrows (relaxed) -->
    <path d="M 4 1.8 L 6 1.8" stroke="#2E5C8A" stroke-width="0.25" stroke-linecap="round"/>
    <path d="M 9 1.8 L 11 1.8" stroke="#2E5C8A" stroke-width="0.25" stroke-linecap="round"/>

    <!-- Arms tucked in -->
    <line x1="2.5" y1="5" x2="1" y2="6" stroke="#6BA3F5" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="12.5" y1="5" x2="14" y2="6" stroke="#6BA3F5" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- ZZZ symbols floating (gentle animation intended) -->
  <g opacity="0.7">
    <text x="11" y="-8" font-size="2.5" font-weight="bold" fill="#4A90E2">Z</text>
    <text x="12.5" y="-4" font-size="2" fill="#6BA3F5">z</text>
    <text x="11.5" y="0" font-size="1.5" fill="#6BA3F5">z</text>
  </g>
</svg>