<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Spark: Happy/Excited State -->

  <!-- Shadow (larger when jumping) -->
  <ellipse cx="7.5" cy="15" rx="7" ry="2.5" fill="rgba(0,0,0,0.2)"/>

  <!-- Body (slightly rotated up for bounce) -->
  <g transform="translate(0, -2) rotate(-5 7.5 4)">
    <!-- Main body -->
    <rect x="2" y="-2" width="11" height="11" rx="2" fill="#4A90E2" opacity="0.95"/>

    <!-- Ears bouncing -->
    <circle cx="4" cy="-4" r="1.2" fill="#4A90E2"/>
    <circle cx="10" cy="-4" r="1.2" fill="#4A90E2"/>

    <!-- Belly -->
    <rect x="3.5" y="1" width="8" height="5" rx="1.5" fill="#6BA3F5" opacity="0.7"/>

    <!-- BIG HAPPY EYES -->
    <g>
      <!-- Left eye wide open -->
      <circle cx="5" cy="2.5" r="2" fill="white"/>
      <circle cx="5" cy="2.5" r="1.3" fill="#000000"/>
      <circle cx="5.4" cy="2" r="0.6" fill="white" opacity="0.9"/>

      <!-- Right eye wide open -->
      <circle cx="10" cy="2.5" r="2" fill="white"/>
      <circle cx="10" cy="2.5" r="1.3" fill="#000000"/>
      <circle cx="10.4" cy="2" r="0.6" fill="white" opacity="0.9"/>
    </g>

    <!-- HUGE SMILE -->
    <path d="M 5 5.5 Q 7.5 7 10 5.5" stroke="#000000" stroke-width="0.4" fill="none" stroke-linecap="round"/>
    <path d="M 5.5 6 Q 7.5 6.5 9.5 6" stroke="#FFB347" stroke-width="0.3" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Happy eyebrows (raised high) -->
    <path d="M 3.8 0.8 Q 5 0.2 6.2 0.8" stroke="#2E5C8A" stroke-width="0.4" fill="none" stroke-linecap="round"/>
    <path d="M 8.8 0.8 Q 10 0.2 11.2 0.8" stroke="#2E5C8A" stroke-width="0.4" fill="none" stroke-linecap="round"/>

    <!-- Blush marks -->
    <circle cx="2.5" cy="4" r="0.8" fill="#FF9999" opacity="0.4"/>
    <circle cx="12.5" cy="4" r="0.8" fill="#FF9999" opacity="0.4"/>
  </g>

  <!-- Raised arms (celebrating) -->
  <g>
    <!-- Left arm up -->
    <line x1="2" y1="2" x2="-0.5" y2="-1" stroke="#4A90E2" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="-1" cy="-1.5" r="0.7" fill="#6BA3F5"/>

    <!-- Right arm up -->
    <line x1="13" y1="2" x2="15.5" y2="-1" stroke="#4A90E2" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="16" cy="-1.5" r="0.7" fill="#6BA3F5"/>
  </g>
</svg>