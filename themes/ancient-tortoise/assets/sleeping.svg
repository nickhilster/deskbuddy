<svg viewBox="-15 -25 45 45" xmlns="http://www.w3.org/2000/svg">
  <!-- Oogway: Sleeping State -->

  <ellipse id="shadow-js" cx="7.5" cy="16.5" rx="7.5" ry="2" fill="rgba(0,0,0,0.15)"/>

  <g>
    <line x1="1" y1="8" x2="-1" y2="9.5" stroke="#A9BF8B" stroke-width="1" stroke-linecap="round"/>
    <line x1="14" y1="8" x2="16" y2="9.5" stroke="#A9BF8B" stroke-width="1" stroke-linecap="round"/>
  </g>

  <g id="body-js" transform="translate(0 0.5)">
    <!-- Shell dome (main body); tan/cream base with dark-green ring markings, NOT solid green (corrected against reference art) -->
    <ellipse cx="7.5" cy="4" rx="8" ry="6.5" fill="#D9C08C"/>
    <path d="M 0 1.5 Q 7.5 -3.5 15 1.5" stroke="#4A6636" stroke-width="0.7" fill="none"/>
    <path d="M -0.3 4 Q 7.5 -0.5 15.3 4" stroke="#4A6636" stroke-width="0.7" fill="none"/>
    <path d="M -0.5 6.5 Q 7.5 2.5 15.5 6.5" stroke="#4A6636" stroke-width="0.7" fill="none"/>

    <!-- Small sage head peeking from shell -->
    <ellipse cx="7.5" cy="0.5" rx="4" ry="3.2" fill="#A9BF8B"/>

    <!-- Small dark-green collar accent (minimal clothing) -->
    <rect x="4.5" y="8.5" width="6" height="1.6" rx="0.6" fill="#4A6636"/>

    <!-- Mouth: calm closed-mouth line, slight upturn -->
    <path d="M 6 2.4 Q 7.5 2.8 9 2.4" stroke="#33422A" stroke-width="0.3" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows: relaxed, barely-there -->
    <path d="M 5 -0.6 Q 5.8 -0.8 6.6 -0.6" stroke="#33422A" stroke-width="0.25" fill="none" stroke-linecap="round"/>
    <path d="M 8.4 -0.6 Q 9.2 -0.8 10 -0.6" stroke="#33422A" stroke-width="0.25" fill="none" stroke-linecap="round"/>

    <!-- Eyes Group (trackable); fully closed, flat lines -->
    <g id="eyes-js">
      <path d="M 4.6 0.6 L 7 0.6" stroke="#33422A" stroke-width="0.3" stroke-linecap="round"/>
      <path d="M 8 0.6 L 10.4 0.6" stroke="#33422A" stroke-width="0.3" stroke-linecap="round"/>
    </g>
  </g>
  <g opacity="0.7"><text x="12" y="-9" font-size="2.5" font-weight="bold" fill="#4A6636">Z</text></g>
</svg>
